services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - TZ=Asia/Shanghai
      - GENERIC_TIMEZONE=Asia/Shanghai
      - N8N_SECURE_COOKIE=false
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - NODE_FUNCTION_ALLOW_BUILTIN=fs,path
    volumes:
      - n8n_data:/home/node/.n8n
      - ./output:/files
    depends_on:
      amazon-crawler:
        condition: service_healthy

  amazon-crawler:
    build:
      context: ./local-services/amazon-crawler
    container_name: amazon-crawler
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      - TZ=Asia/Shanghai
      - PORT=8787
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  n8n_data:
